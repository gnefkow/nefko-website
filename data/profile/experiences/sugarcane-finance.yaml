notes: |
  Migrated from content/experience-yamls/sugarcane-finance.yaml.

  The research divided participants into three groups: no DeFi experience, custodial-only
  crypto experience, and deep non-custodial DeFi experience. The MVP focused on groups
  with prior crypto experience. Users who had experience had largely moved on from crypto
  by 2023 because yields and price action were no longer strong.

  A key design goal was progressive disclosure across three levels: approachable main-app
  copy, richer modal detail, and technical docs for advanced-user trust.
