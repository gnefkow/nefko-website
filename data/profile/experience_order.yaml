# Ordered list of experience record ids for templates that need explicit sequencing.
# Default fallback: sort by start_year descending, then title.
#
# Field schema (each file in content/experiences/):
#   id, title, role, organization, organization_entity_id
#   years, start_year, end_year (end_year null = ongoing)
#   location, summary, domains, keywords, methods
#   related_case_study, related_testimonials, outcomes
#   status: draft | published
#   type: employment | freelance | research | advisory | teaching | ...
#   parent_experience_id: (optional) id of parent tenure
#
# Narrative: write in the markdown body under ## headings (e.g. Project overview,
# Outcome, Worldview). Hugo parses sections into JSON — do not duplicate in front matter.
#
# Hugo emits per experience:
#   /experiences/<slug>/           HTML quiet page
#   /experiences/<slug>/index.json AI payload (same source)
# Rows in /ai/experiences.json include canonical_url + json_url.

order:
  - rocketbook
  - sugarcane-finance
  - cradl
  - jpm-onyx
  - grid-ai
  - yoma-bank
  - frog-shanghai
  - medsana
  - frog-austin
