{{ define "main" }}
    {{ $data := .Data }}
  <article class="nested-copy-line-height">
    <div class="page-gutter pv3 pv4-l">
      <div class="measure-wide center f4 lh-copy nested-copy-line-height nested-links {{ $.Param "text_color" | compare.Default "mid-gray" }}">
        {{ .Content }}
      </div>
    </div>
    <div class="page-gutter">
      <section class="mt5">
        {{ range $term := .Data.Pages }}
          <h2 class="f1">
            <a href="{{ $term.RelPermalink }}" class="link blue hover-black">
              {{ $.Data.Singular | inflect.Humanize }}: {{ $term.LinkTitle }}
            </a>
          </h2>
          {{ range $term.Pages }}
            {{ .Render "summary" }}
          {{ end }}
        {{ end }}
      </section>
    </div>
  </article>
{{ end }}
