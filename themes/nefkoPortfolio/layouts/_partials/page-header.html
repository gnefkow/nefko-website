{{ $featured_image := partials.Include "func/GetFeaturedImage.html" . }}
{{ if $featured_image }}
  {{ $featured_image_class := .Params.featured_image_class | compare.Default "page-hero cover bg-center" }}
  <div class="{{ $featured_image_class }}" style="background-image: url('{{ $featured_image }}');" role="img" aria-label="{{ .Title }}"></div>
{{ end }}
