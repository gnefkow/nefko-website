{{ define "main" }}
  <article class="nested-copy-line-height">
    <div class="page-gutter pv3 pv4-l">
      <section class="cf f4 tc-l center measure-wide lh-copy nested-links {{ $.Param "text_color" | compare.Default "text-secondary" }}">
        {{- .Content -}}
      </section>
    </div>
    <div class="page-gutter">
      <div class="measure-wide center">
        <div class="featured-block cf text-primary mt5">
          <ul class="featured-block__list list pl0 mt0 mb0">
            {{ range .Paginator.Pages }}
              {{ .Render "summary" }}
            {{ end }}
          </ul>
        </div>
        {{ partial "pagination.html" . -}}
      </div>
    </div>
  </article>
{{ end }}
