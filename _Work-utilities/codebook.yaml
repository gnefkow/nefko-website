version: "0.1"
updated: "2026-06-24"
purpose: >
  Living tag codebook for Kyle Becker's UX portfolio. These tags are meant to
  help AI agents, recruiter bots, and site tooling identify relevant content
  quickly across case studies, testimonials, AI-readable pages, and transcript-
  derived articles.

usage_notes:
  - Prefer stable lowercase slugs in content metadata.
  - Use aliases as natural-language matches for search, scraping, and LLM routing.
  - Add new tags when repeated themes appear across multiple pages, testimonials, or conversations.
  - Keep tags focused on recruiter-relevant evidence: domain expertise, methods, roles, outcomes, and collaboration patterns.

tag_groups:
  professional_positioning:
    description: Core ways Kyle should be understood professionally.
    tags:
      - slug: strategic-design
        label: Strategic Design
        aliases: [design strategy, UX strategy, strategy design]
        description: Work that defines what should be built, why it matters, and how teams should align around it.
      - slug: ux-research
        label: UX Research
        aliases: [design research, user research, qualitative research]
        description: Planning, conducting, synthesizing, and communicating research about users, markets, and systems.
      - slug: product-strategy
        label: Product Strategy
        aliases: [product definition, product direction, roadmap strategy]
        description: Early product shaping, opportunity framing, MVP definition, and market-informed product decisions.
      - slug: systems-thinking
        label: Systems Thinking
        aliases: [complex systems, system mapping, ecosystem mapping]
        description: Mapping relationships among people, organizations, data, incentives, workflows, and technical systems.
      - slug: strategic-generalist
        label: Strategic Generalist
        aliases: [hybrid designer, multi-skilled designer, design strategist]
        description: Evidence that Kyle can move between research, strategy, facilitation, product design, and implementation detail.
      - slug: complexity
        label: Complexity
        aliases: [complex domains, ambiguous problems, deep domains]
        description: Work in domains where the value comes from quickly understanding difficult systems and making them legible.
      - slug: facilitation
        label: Facilitation
        aliases: [workshops, stakeholder facilitation, alignment sessions]
        description: Helping cross-functional groups reason together through maps, prototypes, diagrams, and shared artifacts.
      - slug: stakeholder-alignment
        label: Stakeholder Alignment
        aliases: [cross-functional alignment, organizational alignment, corporate therapy]
        description: Work that helps teams with different goals, vocabularies, or incentives reach a shared understanding.
      - slug: sensemaking
        label: Sensemaking
        aliases: [synthesis, research synthesis, insight synthesis]
        description: Turning ambiguous inputs, interviews, transcripts, and stakeholder conversations into clear frameworks and direction.
      - slug: frameworks
        label: Frameworks
        aliases: [mental models, strategic frameworks, research frameworks]
        description: Reusable models that explain complex fields, user journeys, adoption barriers, or organizational dynamics.
      - slug: storytelling
        label: Storytelling
        aliases: [narrative, executive storytelling, presentation design]
        description: Translating complex research and strategy into narratives that help teams decide and act.
      - slug: design-leadership
        label: Design Leadership
        aliases: [UX leadership, design team leadership, practice leadership]
        description: Leading designers, building UX practices, mentoring teams, and improving design process maturity.
      - slug: mentorship
        label: Mentorship
        aliases: [coaching, design coaching, team development]
        description: Coaching designers, researchers, and cross-functional partners into stronger practices.

  methods_and_deliverables:
    description: Repeatable methods, artifacts, and outputs visible in the portfolio.
    tags:
      - slug: journey-mapping
        label: Journey Mapping
        aliases: [user journeys, onboarding journey, service journeys]
        description: Mapping steps, barriers, touchpoints, and decision moments in user or organizational experiences.
      - slug: service-design
        label: Service Design
        aliases: [service blueprinting, operational design, customer service flows]
        description: Designing interactions across channels, support models, human handoffs, and back-office systems.
      - slug: prototyping
        label: Prototyping
        aliases: [interactive prototypes, concept prototypes, Figma prototypes]
        description: Making ideas concrete enough for user feedback, stakeholder alignment, and engineering planning.
      - slug: product-definition
        label: Product Definition
        aliases: [scope definition, MVP definition, product framing]
        description: Defining the user, value proposition, feature set, and product boundaries before full buildout.
      - slug: design-systems
        label: Design Systems
        aliases: [component systems, Figma systems, UI systems]
        description: Creating or rolling out systems that improve visual coherence and engineering efficiency.
      - slug: data-visualization
        label: Data Visualization
        aliases: [reporting UX, dashboards, complex data displays]
        description: Translating complex datasets, schemas, or reporting needs into useful interfaces.
      - slug: agile
        label: Agile
        aliases: [scrum, product backlog, user stories]
        description: Integrating design work into agile delivery, backlog planning, and engineering workflows.
      - slug: field-research
        label: Field Research
        aliases: [in-context research, ethnographic research, shadowing]
        description: Research conducted in real-world settings with users, workers, or communities.
      - slug: workshop-design
        label: Workshop Design
        aliases: [alignment workshop, ideation workshop, future casting]
        description: Structured sessions that help teams generate, evaluate, and align on strategic options.
      - slug: research-reports
        label: Research Reports
        aliases: [strategic reports, public reports, insight reports]
        description: Long-form synthesis artifacts such as CRADL reports and public research deliverables.

  ai_and_llm_systems:
    description: Tags for AI strategy, agentic workflows, machine-readable content, and LLM-oriented design.
    tags:
      - slug: ai-strategy
        label: AI Strategy
        aliases: [AI product strategy, strategic AI design, AI-enabled systems]
        description: Deciding where AI belongs in a product, workflow, organization, or service system.
      - slug: llm-readable-design
        label: LLM-Readable Design
        aliases: [AI-readable content, bot-readable content, machine-readable portfolio]
        description: Structuring content so LLMs and recruiter bots can understand, route, cite, and summarize it accurately.
      - slug: machine-legibility
        label: Machine Legibility
        aliases: [AI legibility, structured information, machine-readable context]
        description: Making the right information available to AI systems in useful, bounded, and auditable ways.
      - slug: agent-workflows
        label: Agent Workflows
        aliases: [AI agents, agentic workflows, bespoke agents]
        description: Designing roles, instructions, tools, handoffs, and boundaries for task-specific AI agents.
      - slug: prompt-systems
        label: Prompt Systems
        aliases: [prompt engineering, instructions, soul files]
        description: Designing prompts and instruction files as operational interfaces for AI agents.
      - slug: structured-memory
        label: Structured Memory
        aliases: [institutional memory, personalization, codebooks]
        description: Using tags, schemas, provenance, and files to help AI systems remember in bounded and useful ways.
      - slug: provenance
        label: Provenance
        aliases: [source tracking, citations, evidence trails]
        description: Requiring AI outputs to remain connected to source material so claims can be checked.
      - slug: auditability
        label: Auditability
        aliases: [AI audit, adversarial review, verification loops]
        description: Designing systems where AI work can be reviewed, challenged, tested, and traced by humans or other agents.
      - slug: human-in-the-loop
        label: Human in the Loop
        aliases: [human judgment, human oversight, human handoff]
        description: Defining where human judgment, accountability, approval, or contextual knowledge must enter the system.
      - slug: data-routing
        label: Data Routing
        aliases: [intent routing, tool routing, API routing]
        description: Matching user intent, mode, or task context to the right data, tool, prompt, or workflow.
      - slug: ai-product-design
        label: AI Product Design
        aliases: [AI UX, AI user experience, conversational UX]
        description: Designing end-user or internal experiences where LLMs transform, summarize, recommend, or answer.
      - slug: ai-governance
        label: AI Governance
        aliases: [AI accountability, permissioning, policy boundaries]
        description: Structuring roles, permissions, policies, and review loops around AI-enabled organizational work.

