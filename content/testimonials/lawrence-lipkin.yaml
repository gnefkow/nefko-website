    company: J.P. Morgan
    relationship: Manager
tags: Design Leadership, Financial Services, Banking, Design Research, Design Strategy
full-quote: |
  I would highly recommend working with Kyle if you get the chance! I had the pleasure of working with him on multiple innovation initiatives for JP Morgan Onyx.  In a nutshell: he is a designer's designer. Kyle is 'ahead of the curve' on integrating multiple design skills to solve problems from a human centered perspective.  He is naturally curious, able to learn complex domains quickly, and uses his superb story-telling skills to re-shape and re-frame business ideas into cohesive narratives that enable cross-functional teams to collaborate more effectively.  He showed great skill at all kinds of research and UX/UI problem solving as well, but in his case: the whole is greater than the sum of the parts.  He has a great sense of humor, ethical compass and thirst for solving complex problems. I would be delighted to work with him again.
