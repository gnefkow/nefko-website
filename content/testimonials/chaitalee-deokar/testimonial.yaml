tags: UX Design, Product Strategy, Finance, Treasury Services, Payments, Product Management
full-quote: |
  Kyle and I worked together on a product team building a complex product during its' pilot stage, where I was the Product manager. He was a joy to work with, and having a seasoned, strategic, UI/UX expert was a game-changer for the project as we developed more and more complex aspects of the product. I admire his willingness to hand-hold and not only learn from, but also educate users through design thinking, as well as the healthy push-pull of Product vs design priorities. 
  He quickly got up to speed on complex treasury and finance landscape + understanding customer needs and asked thoughtful questions that impacted the final product in very meaningful ways
  His use of visualizations and design-thinking techniques helped facilitate conversations that managed stakeholders and informed the product strategy very effectively.
