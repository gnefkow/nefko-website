full-quote: |
  Kyle is a great UX lead whom I had a chance to work together at Yoma bank. As we are going through digital transformation, his proficiency at telling the visual story brings everyone on the same page and makes it easier to solve problems as a team. He initiated design rituals for our team to share knowledges on things we were working on and things we learnt, which helps the team grows together. Personally, his mentorship helped me grew immensely, as a designer in creating a holistic experience for the users. It was a joy to work with him and hope for an opportunity to work with him again in the future.