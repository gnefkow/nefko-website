full-quote: |
  Kyle is an inspiration every team needs. I had the great pleasure of working with him on multiple projects at Yoma Bank while the bank underwent its digital transformation. Kyle's expertise in design research, user experience, and design thinking helped the team make customer-focused product prioritization decisions. I witnessed the UX team he lead continuously learn, grow, and deliver the high fidelity designs for each development sprint in a timely manner. I loved our nerd-out sessions with Kyle where he would share basic sketching, prototyping, storyboarding, and more with people across the organization. Kyle earns my highest recommendation and I would love to work with him again in the future.
