full-quote: |
  When we started Crypto Research and Design Lab (CRADL), our founding partner, Lauren Serota, said we have to bring in Kyle Becker. She had worked with him in Burma and spoke about the extensive experience synthesizing insights from qualitative research and articulating them in compelling, actionable ways. And she was right - he was a key leader on our design research team. 
  
  With a background that combines UX research, tech product development, and business strategy, Kyle brings a broad view to the topics he researches. At CRADL in particular, his ability to quickly ramp up on complex topics in Web3 and cryptocurrency enabled him to fluently build rapport with industry participants in ways that revealed the human stories underneath. In synthesis, he is able to work at multiple levels of depth with a topic to understand implications from the the minute level of individual experience to the broader systemic ways trends affect communities, industries and societies.
  
  Kyle was an inspiration to the junior members of our team who learned a lot from him about the design research and how to articulate insights in more compelling and clear ways through frameworks and storytelling. It was amazing to watch their skills and confidence develop as they worked on the projects that he led. If you have a chance to bring Kyle onto your team - do it!
