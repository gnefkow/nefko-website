full-quote: |
  Kyle is a man who loves his craft.  He is a rigorous and thoughtful designer that moves easily between concepts and strategy to prototype and he builds sturdy, organic and beautiful graphics platforms.  Kyle is also an exceptional leader who inspires and coaches his colleagues.  Kyle built an entire UX/UI practice from the ground up as part of our ambitious effort to design, build and market a mass market digital retail banking platform in Myanmar. He was invaluable as a designer, leader, and intellectual partner. I look forward to working with him again!
