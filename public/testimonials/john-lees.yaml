full-quote: |
  Kyle is an incredible resource. I hired him to help us fix a badly broken UX/UI model and what I got was excellent App product strategy, consumer needs understanding, UX/UI definitions, engineer project and task management and delivery of an outstanding result. Kyle transformed a very poor customer experience into an intuitive easy to lean and understand excellent customer experience. He is a great leader with a terrific collaborative style, a keen ability to listen and lead. Most importantly Kyle is driven by curiosity to find the answers that will make a powerful difference. His enthusiasm is infectious.   Please do not hire Kyle as I want him to be fully available for my next project with him.
