full-quote: |
  Kyle is AMAZING! As the CEO of an early-stage startup, I had the opportunity to work with Kyle for an extended period of time. He is an outstanding designer whose expertise in blending customer research, prototyping, and product strategy was remarkable. Unlike many specialists, Kyle's versatility shone through his ability to seamlessly navigate these areas, proving invaluable during our product's early development process. His deep understanding of consumer finance, backed by substantial experience in the crypto/web3 space, enriched our strategy discussions and research. Kyle was not just a contributor but a true strategic partner. I highly recommend him to any team seeking a multi-skilled, strategic, and insightful designer.
